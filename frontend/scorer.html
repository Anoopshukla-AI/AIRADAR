<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICP Scorer — AIRadar | Score AI Startups Against Your Ideal Customer Profile</title>
  <meta name="description" content="Define your ICP and score 500+ AI-first startups instantly. Built into AIRadar — the live AI startup dealflow engine." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── BASE STYLES ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080C0F; --bg2: #0E1418; --bg3: #141C22;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --accent: #00E5A0; --accent2: #0066FF;
      --text: #E8F0F4; --text2: #8BA0AD; --text3: #4A6070;
      --red: #FF4757; --yellow: #FFD32A;
      --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none; z-index: 0;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 40%, transparent 100%);
    }
    
    /* ── HEADER ── */
    header { position: relative; z-index: 10; padding: 2rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .logo-area { display: flex; flex-direction: column; gap: 4px; }
    .logo-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
    h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; color: var(--text); }
    .nav-links { display: flex; gap: 16px; font-family: var(--mono); font-size: 11px; }
    .nav-links a { color: var(--text3); text-decoration: none; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; transition: 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.05); }

    /* ── CONTAINER ── */
    .container { position: relative; z-index: 10; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 2.5rem; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; }
    @media(max-width: 800px) { .container { grid-template-columns: 1fr; } }
    
    .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
    .panel-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
    
    /* ── FORM ── */
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-family: var(--mono); font-size: 11px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="text"], textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-family: var(--mono); font-size: 13px; padding: 12px; outline: none; transition: 0.15s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 120px; line-height: 1.5; }
    .hint { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 6px; }
    
    button.submit-btn {
      width: 100%; background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3); border-radius: 8px;
      color: var(--accent); font-family: var(--mono); font-size: 13px; font-weight: bold; padding: 14px;
      cursor: pointer; transition: 0.2s;
    }
    button.submit-btn:hover { background: rgba(0,229,160,0.2); }
    button.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── RESULTS ── */
    #results-area { display: none; }
    .score-circle {
      width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 0 auto 2rem; font-size: 2.5rem; font-weight: 800; color: var(--accent);
      background: var(--bg); box-shadow: 0 0 20px rgba(0,229,160,0.1);
    }
    .score-circle span { font-size: 10px; font-family: var(--mono); font-weight: 400; color: var(--text3); letter-spacing: 0.1em; }
    
    .signals-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
    .signal-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; color: var(--text2); line-height: 1.5;
    }
    .signal-icon { font-size: 14px; flex-shrink: 0; }
    .signal-met .signal-icon { color: var(--accent); }
    .signal-missed .signal-icon { color: var(--red); }
    .signal-met { border-color: rgba(0,229,160,0.2); background: rgba(0,229,160,0.02); color: var(--text); }
    
    .rationale-box { font-family: var(--mono); font-size: 11px; color: var(--text2); line-height: 1.6; padding-left: 12px; border-left: 2px solid var(--accent); }
    
    .loading-state { text-align: center; color: var(--text3); font-family: var(--mono); font-size: 13px; padding: 3rem 0; display: none; }
    .dots::after { content: ''; animation: dots 1.2s steps(4, end) infinite; }
    @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }

  </style>
</head>

          <option value="Series A">Series A (Finding PMF)</option>

    </div>
  </div>
