name: GTM Intelligence Pipeline

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Run enrichment pipeline
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          PDL_API_KEY:      ${{ secrets.PDL_API_KEY }}
          HUNTER_API_KEY:   ${{ secrets.HUNTER_API_KEY }}
          WORKER_URL:       ${{ secrets.WORKER_URL }}
          PIPELINE_SECRET:  ${{ secrets.PIPELINE_SECRET }}
        run: |
          python pipeline/enrich.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed — check logs above"
          # Add Slack webhook notification here if needed
